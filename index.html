<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finanças Pessoais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
</head>

<body>
    <div id="root"></div>
    <script>
        (function () {
            function send(message, stack) {
                try { parent.postMessage({ __forge: true, type: 'forge-error', message: String(message || 'erro'), stack: String(stack || '') }, '*'); } catch (e) { }
            }
            window.addEventListener('error', function (e) { send(e.message, e.error && e.error.stack); });
            window.addEventListener('unhandledrejection', function (e) { var r = e.reason; send(r && (r.message || r), r && r.stack); });
        })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
